<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio - Sistema de Eventos Universitarios</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="estilos.css">
</head>
<body class="bg-gray-50">

    <!-- Sidebar -->
    <div class="fixed left-0 top-0 bottom-0 w-72 bg-white border-r shadow-xl z-50">
        <div class="p-6 border-b">
            <img src="img/logo-ug.png" alt="Universidad de Guayaquil" class="h-14 mx-auto">
        </div>

        <div class="p-6">
            <div class="flex items-center gap-3 mb-10">
                <div class="w-12 h-12 bg-[#1FB9DE] rounded-2xl flex items-center justify-center text-white text-2xl font-medium">RA</div>
                <div>
                    <p class="font-semibold">Ronald Andagoya</p>
                    <p class="text-xs text-gray-500">Estudiante • Ingeniería</p>
                </div>
            </div>

            <nav class="space-y-1">
                <a href="#" class="nav-link active flex items-center gap-3 px-4 py-3 rounded-2xl">
                    <i class="fa-solid fa-house w-5"></i>
                    <span class="font-medium">Inicio</span>
                </a>
                <a href="eventos.html" class="nav-link flex items-center gap-3 px-4 py-3 rounded-2xl">
                    <i class="fa-solid fa-calendar w-5"></i>
                    <span class="font-medium">Eventos</span>
                </a>
                <a href="#" class="nav-link flex items-center gap-3 px-4 py-3 rounded-2xl">
                    <i class="fa-solid fa-users w-5"></i>
                    <span class="font-medium">Mis Inscripciones</span>
                </a>
                <a href="#" class="nav-link flex items-center gap-3 px-4 py-3 rounded-2xl">
                    <i class="fa-solid fa-chart-bar w-5"></i>
                    <span class="font-medium">Asistencia</span>
                </a>
            </nav>
        </div>
    </div>

    <!-- Contenido Principal -->
    <div class="ml-72">
        <header class="bg-white border-b px-8 py-5 flex items-center justify-between">
            <div class="relative w-96">
                <input type="text" placeholder="Buscar eventos..."
                       class="w-full bg-gray-100 border border-transparent focus:border-[#1FB9DE] rounded-3xl py-3 pl-12 focus:outline-none">
                <i class="fa-solid fa-magnifying-glass absolute left-5 top-1/2 -translate-y-1/2 text-gray-400"></i>
            </div>

            <div class="flex items-center gap-6">
                <button class="relative hover:text-[#1FB9DE]">
                    <i class="fa-solid fa-bell text-2xl"></i>
                    <span class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] w-5 h-5 flex items-center justify-center rounded-full">3</span>
                </button>
                <div class="flex items-center gap-3">
                    <div class="text-right">
                        <p class="font-medium text-sm">Ronald Andagoya</p>
                        <p class="text-xs text-gray-500">Estudiante</p>
                    </div>
                    <div class="w-9 h-9 bg-[#1FB9DE] rounded-2xl flex items-center justify-center text-white font-medium">RA</div>
                </div>
            </div>
        </header>

        <div class="p-8">
            <h1 class="text-4xl font-bold">¡Bienvenido, Ronald!</h1>
            <p class="text-gray-600 mt-1">Sistema de Eventos Universitarios</p>

            <!-- Estadísticas -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 my-10">
                <div class="bg-white rounded-3xl p-6 card-hover border">
                    <p class="text-sm text-gray-500">Eventos próximos</p>
                    <p class="text-5xl font-bold text-[#1FB9DE] mt-2">12</p>
                </div>
                <div class="bg-white rounded-3xl p-6 card-hover border">
                    <p class="text-sm text-gray-500">Mis inscripciones</p>
                    <p class="text-5xl font-bold text-[#1FB9DE] mt-2">8</p>
                </div>
                <div class="bg-white rounded-3xl p-6 card-hover border">
                    <p class="text-sm text-gray-500">Asistencia</p>
                    <p class="text-5xl font-bold text-[#1FB9DE] mt-2">94%</p>
                </div>
            </div>

            <h2 class="text-2xl font-semibold mb-6">Próximos Eventos</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
        </div>
    </div>
</body>
</html>
