<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Noticias</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <link rel="stylesheet" href="css/estilos.css">
</head>

<body class="bg-gray-50">

    <div id="sidebar-container"></div>

    <div class="ml-72">

        <header class="bg-white border-b px-8 py-5">

            <h1 class="text-4xl font-bold">
                Noticias
            </h1>

            <p class="text-gray-500 mt-1">
                Noticias y anuncios universitarios
            </p>

        </header>

        <div class="p-8">

            <div class="flex justify-between items-center mb-8">

                <h2 class="text-2xl font-semibold">
                    Últimas Noticias
                </h2>

                <button class="btn-primary text-white px-6 py-3 rounded-2xl font-semibold">

                    <i class="fa-solid fa-plus mr-2"></i>

                    Nueva Noticia

                </button>

            </div>

            <!-- Cards -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">

                <div class="bg-white rounded-3xl overflow-hidden border card-hover">

                    <img src="https://picsum.photos/400/200"
                         class="w-full h-48 object-cover">

                    <div class="p-6">

                        <h3 class="text-xl font-bold mb-2">
                            Congreso Internacional
                        </h3>

                        <p class="text-gray-600 mb-4">
                            Inscripciones abiertas para el evento tecnológico.
                        </p>

                        <div class="flex gap-2">

                            <button class="px-4 py-2 bg-blue-100 text-blue-700 rounded-xl text-sm font-semibold">
                                Editar
                            </button>

                            <button class="px-4 py-2 bg-red-100 text-red-700 rounded-xl text-sm font-semibold">
                                Eliminar
                            </button>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <script src="js/sidebar.js"></script>

</body>

</html>
